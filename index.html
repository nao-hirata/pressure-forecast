<style>

<body>
<div class="wrap">
  <header>
    <h1>気圧予報 <span class="loc">東京</span></h1>

  </header>

    <div class="state">気圧データを取得しています…</div>
  </div>

<script type="module">
// Firebase SDK は設定済みのときだけ動的 import する（未設定/オフラインでも気圧グラフは動く）
const FIREBASE_VER = '10.12.2';

// ▼ Firebase 設定 — コンソールで取得した値を貼ってください（未設定ならこの端末内のみ localStorage に保存）
const firebaseConfig = {
  apiKey: "AIzaSyD1bAOyh1C9Ue1rtNwXFl_34QQJunE5-xQ",
  authDomain: "pressure-forecast-4-cobu.firebaseapp.com",
  projectId: "pressure-forecast-4-cobu",
  storageBucket: "pressure-forecast-4-cobu.firebasestorage.app",
  messagingSenderId: "913283032838",
  appId: "1:913283032838:web:6ed9fb7ce1f7e319576087",
  measurementId: "G-E06F0VGTYB",
};

// App Check（reCAPTCHA v3）のサイトキー。未設定（YOUR_...）なら App Check は無効のまま
const RECAPTCHA_SITE_KEY = "6Lfl6wstAAAAAFT0_XkQFPtx1w3WbUaJ5yad3YNY";

// 体調記録のラベル（色付き）。日常は label を空にして表すのでここには含めない
const LABELS = [
  { id: 'seizure',  name: '発作', color: '#ff6b6b' },
  { id: 'medicine', name: '薬',   color: '#4cc9f0' },
];
const DAILY = { id: '', name: '日常', color: 'var(--ink-dim)' };
const labelById = id => LABELS.find(l => l.id === id) || null;

const LAT = 35.68, LON = 139.69;
// 日本最適化の JMA（GSM+MSM）を優先し、ダメなら best_match→GFS の順にフォールバックする
// past_days=7 で直近7日の実績、forecast_days=7 で予報を一度に取得する
const ENDPOINTS = [
  `https://api.open-meteo.com/v1/jma?latitude=${LAT}&longitude=${LON}&hourly=pressure_msl&timezone=Asia%2FTokyo&past_days=7&forecast_days=7`,
  `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&hourly=pressure_msl&timezone=Asia%2FTokyo&past_days=7&forecast_days=7`,
  `https://api.open-meteo.com/v1/gfs?latitude=${LAT}&longitude=${LON}&hourly=pressure_msl&timezone=Asia%2FTokyo&past_days=7&forecast_days=7`
];

const fmtTime = iso => {
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:00`;
};
// 「最終取得」など現在時刻表示用（毎時データの fmtTime と違い分まで出す）
const fmtNow = d => `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
// 数値カード用フォーマッタ。非有限値（欠損）は '–' を返す
const fmtVal = (v, d) => Number.isFinite(v) ? v.toFixed(d) : '–';

async function load() {
  const errors = [];
  for (const url of ENDPOINTS) {
    try {
      const res = await fetch(url);
      if (!res.ok) {
        const body = await res.text().catch(() => '');
        throw new Error(`HTTP ${res.status} ${res.statusText}${body ? ' / ' + body.slice(0,120) : ''}`);
      }
      const data = await res.json();
      if (!data.hourly || !data.hourly.pressure_msl) throw new Error('レスポンスに気圧データが含まれていません');
      setupData(data);
      return;
    } catch (e) {
      errors.push(`${url.split('?')[0]} → ${e.name}: ${e.message}`);
    }
  }
  // すべて失敗
  const isTypeErr = errors.some(e => e.includes('TypeError') || e.includes('Failed to fetch') || e.includes('NetworkError'));
  document.getElementById('content').innerHTML =
    `<div class="state" style="text-align:left">
      <p style="margin-bottom:12px;color:var(--warn);font-weight:700">データの取得に失敗しました</p>
      ${isTypeErr ? `<p style="margin-bottom:12px">通信自体がブロックされている可能性が高いです。考えられる原因:</p>
      <ul style="margin:0 0 12px 20px;line-height:1.8">
        <li>ファイルを <code>file://</code> で直接開いている（一部ブラウザで通信が制限されます）→ 後述の方法で開いてください</li>
        <li>広告ブロッカー・ブラウザ拡張・社内プロキシが <code>api.open-meteo.com</code> を遮断している</li>
        <li>ネットワークがオフライン</li>
      </ul>
      <p style="margin-bottom:6px;font-weight:600">file:// 対策（ローカルサーバで開く）:</p>
      <pre style="background:var(--panel-2);padding:10px;border-radius:8px;overflow-x:auto;font-size:0.78rem">cd フォルダ
python3 -m http.server 8000
# ブラウザで http://localhost:8000/pressure.html を開く</pre>` : ''}
      <details style="margin-top:14px"><summary style="cursor:pointer;color:var(--ink-dim)">技術的な詳細</summary>
        <pre style="background:var(--panel-2);padding:10px;border-radius:8px;overflow-x:auto;font-size:0.74rem;margin-top:8px;white-space:pre-wrap">${errors.join('\n\n')}</pre>
      </details>
    </div>`;
  document.getElementById('updated').textContent = '';
}

function detectDrops(times, vals, fromIdx = 0) {
  // 6時間で3hPa以上の低下を、現在以降の区間について検出
  const alerts = [];
  for (let i = 0; i < vals.length; i++) {
    if (i >= 6 && i >= fromIdx) {
      const d6 = vals[i-6] - vals[i];
      if (d6 >= 3) alerts.push({ idx: i, type: '6h', drop: d6, time: times[i] });
    }
  }
  // 連続検出を区間化（隣接する警告点をまとめる）
  const merged = [];
  for (const a of alerts) {
    const last = merged[merged.length-1];
    if (last && a.idx - last.endIdx <= 3) {
      last.endIdx = a.idx; last.endTime = a.time;
      last.maxDrop = Math.max(last.maxDrop, a.drop);
    } else {
      merged.push({ startIdx: a.idx, endIdx: a.idx, startTime: times[Math.max(0, a.idx-6)], endTime: a.time, maxDrop: a.drop });
    }
  }
  // 緩い低下で途切れた近接区間を、隙間（≤12h）で気圧が反発していなければ統合
  const joined = [];
  for (const m of merged) {
    const last = joined[joined.length-1];
    if (last && m.startIdx - last.endIdx <= 12 &&
        Math.max(...vals.slice(last.endIdx, m.startIdx + 1)) <= vals[last.endIdx] + 1) {
      last.endIdx = m.endIdx; last.endTime = m.endTime;
      last.maxDrop = Math.max(last.maxDrop, m.maxDrop);
    } else {
      joined.push(m);
    }
  }
  for (const m of joined) {
    const s = Math.max(0, m.startIdx - 6), e = m.endIdx;
    const seg = vals.slice(s, e + 1);
    m.totalDrop = Math.max(...seg) - Math.min(...seg);
  }
  return joined;
}

// 取得した全データ（過去7日＋予報7日）と「現在」インデックスを保持する
let ALL = null, CUR_IDX = 0;

function setupData(data) {
  ALL = {
    times: data.hourly.time,
    vals: data.hourly.pressure_msl,
    unit: data.hourly_units.pressure_msl,
  };
  const nowMs = Date.now();
  CUR_IDX = 0;
  for (let i = 0; i < ALL.times.length; i++) {
    if (new Date(ALL.times[i]).getTime() <= nowMs) CUR_IDX = i; else break;
  }
  render();
}

const trendTxt = (d, unit) => {
  if (d <= -1) return `<span class="trend down">▼ ${d.toFixed(1)} ${unit}</span>`;
  if (d >= 1) return `<span class="trend up">▲ +${d.toFixed(1)} ${unit}</span>`;
  return `<span class="trend flat">→ 横ばい</span>`;
};

// メイングラフ・ミニグラフ共通のY軸範囲。基準範囲を必ず確保し、データがはみ出たら2hPa刻みで広げる
const Y_BASE_LO = 985, Y_BASE_HI = 1025;
function yRange(vals) {
  const fin = vals.filter(v => Number.isFinite(v));
  const minV = fin.length ? Math.min(...fin) : Y_BASE_LO;
  const maxV = fin.length ? Math.max(...fin) : Y_BASE_HI;
  const lo = Math.min(Y_BASE_LO, Math.floor((minV - 2) / 2) * 2);
  const hi = Math.max(Y_BASE_HI, Math.ceil((maxV + 2) / 2) * 2);
  return { lo, hi };
}

// グラフ用のデータ切り出し。mode: 'forecast'（今日0時〜7日先） / 'past'（直近7日間）
function sliceFor(mode) {
  const todayStart = new Date(); todayStart.setHours(0, 0, 0, 0);
  let f0 = ALL.times.findIndex(t => new Date(t).getTime() >= todayStart.getTime());
  if (f0 < 0) f0 = 0;
  if (mode === 'past') {
    // 当日分は予報グラフ側に出るので、前日23:00までの7日間（168時間）を表示する
    const end = f0 - 1;
    const start = Math.max(0, end - 167);
    const times = ALL.times.slice(start, end + 1);
    const vals = ALL.vals.slice(start, end + 1);
    return { times, vals, curIdx: times.length - 1, showNow: false };
  }
  return { times: ALL.times.slice(f0), vals: ALL.vals.slice(f0), curIdx: CUR_IDX - f0, showNow: true };
}

// カード・警告は常に予報ベース。グラフだけトグルで予報／過去を切り替える
function render() {
  const unit = ALL.unit;
  const { times, vals, curIdx } = sliceFor('forecast');

  document.getElementById('updated').textContent =
    `最終取得: ${fmtNow(new Date())}（予報期間 ${fmtTime(times[0])} 〜 ${fmtTime(times[times.length-1])}）`;

  const finite = vals.filter(v => Number.isFinite(v));
  const min = finite.length ? Math.min(...finite) : null;
  const max = finite.length ? Math.max(...finite) : null;
  const cur = vals[curIdx];
  const next6 = Number.isFinite(vals[curIdx+6]) && Number.isFinite(cur) ? vals[curIdx+6] - cur : 0;
  const next24 = Number.isFinite(vals[curIdx+24]) && Number.isFinite(cur) ? vals[curIdx+24] - cur : 0;

  const drops = detectDrops(times, vals, curIdx);

  let alertHtml = '<div class="alerts">';
  if (drops.length === 0) {
    alertHtml += `<div class="no-alert"><span class="ic">✓</span><span>今後7日間で、急な気圧低下は予測されていません。</span></div>`;
  } else {
    for (const d of drops) {
      alertHtml += `<div class="alert"><span class="ic">⚠</span><div class="t">
        <div class="period">${fmtTime(d.startTime)} → ${fmtTime(d.endTime)}</div>
        <div class="drop">約 <span class="u">${d.totalDrop.toFixed(0)} ${unit}</span> 低下<span class="sub2">（最急 6h ▼${d.maxDrop.toFixed(0)}）</span></div>
      </div></div>`;
    }
  }
  alertHtml += '</div>';

  const cards = `
    <div class="cards">
      <div class="card"><div class="label">現在の気圧</div>
        <div class="value">${fmtVal(cur, 1)} <small>${unit}</small></div></div>
      <div class="card"><div class="label">6時間後</div>
        <div class="value">${fmtVal(vals[curIdx+6], 1)} <small>${unit}</small></div>${trendTxt(next6, unit)}</div>
      <div class="card"><div class="label">24時間後</div>
        <div class="value">${fmtVal(vals[curIdx+24], 1)} <small>${unit}</small></div>${trendTxt(next24, unit)}</div>
      <div class="card"><div class="label">7日間の変動幅</div>
        <div class="value">${Number.isFinite(min) && Number.isFinite(max) ? (max - min).toFixed(0) : '–'} <small>${unit}</small></div>
        <div class="range-sub">${fmtVal(min, 0)}–${fmtVal(max, 0)} ${unit}</div></div>
    </div>`;

  document.getElementById('content').innerHTML =
    alertHtml + cards +
    `<div class="panel">
      <h2>気圧の推移
        <span class="view-toggle" id="viewToggle">
          <button type="button" data-mode="forecast" class="active">予報</button>
          <button type="button" data-mode="past">過去</button>
        </span>
      </h2>
      <div id="chartOuter">
        <svg id="yAxisFixed"></svg>
        <div id="chartScroll"></div>
      </div>
      <div class="chart-hint">横スワイプで移動・長押しで詳細</div>
      <div id="recBar" class="rec-bar">
        <span class="rec-bar-label" id="recBarLabel">グラフ長押しで時刻選択</span>
        <button type="button" id="recBtn" class="rec-btn">記録</button>
      </div></div>`;

  document.getElementById('viewToggle').addEventListener('click', e => {
    const btn = e.target.closest('button[data-mode]');
    if (btn) drawChartView(btn.dataset.mode);
  });
  document.getElementById('recBtn').addEventListener('click', () => openRecordDialog(selectedTime));
  drawChartView('forecast');
}

// グラフのみを指定モードで描き直す
function drawChartView(mode) {
  document.querySelectorAll('#viewToggle button').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode));
  selectedTime = null;
  const lbl = document.getElementById('recBarLabel');
  if (lbl) lbl.textContent = 'グラフ長押しで時刻選択';
  const { times, vals, curIdx, showNow } = sliceFor(mode);
  const drops = detectDrops(times, vals, mode === 'past' ? 0 : curIdx);
  drawChart(times, vals, ALL.unit, drops, curIdx, showNow);
}

function drawChart(times, vals, unit, drops, curIdx, showNow) {
  const scroll = document.getElementById('chartScroll');
  const yAxis = document.getElementById('yAxisFixed');
  const n = vals.length;
  const W = Math.max(820, n * 4.6);
  const H = 320;
  const padL = 48, padR = 16, padT = 26, padB = 40;
  const plotW = W - padL - padR, plotH = H - padT - padB;

  const { lo, hi } = yRange(vals);
  const x = i => padL + (i / (n - 1)) * plotW;
  const y = v => padT + (1 - (v - lo) / (hi - lo)) * plotH;

  let path = '', area = '';
  vals.forEach((v, i) => {
    path += (i === 0 ? 'M' : 'L') + x(i).toFixed(1) + ',' + y(v).toFixed(1) + ' ';
  });
  area = path + `L${x(n-1).toFixed(1)},${padT+plotH} L${x(0).toFixed(1)},${padT+plotH} Z`;

  // Y grid（線はスクロール側、ラベルは固定側）
  let grid = '', yLabels = '';
  const step = (hi - lo) / 5;
  for (let k = 0; k <= 5; k++) {
    const v = lo + step * k, yy = y(v);
    grid += `<line class="gridline" x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}"/>`;
    yLabels += `<text class="axis-label" x="${padL-8}" y="${yy+4}" text-anchor="end">${v.toFixed(0)}</text>`;
  }
  // 固定Y軸の単位ラベル
  yLabels += `<text class="axis-label" x="${padL-8}" y="${padT-14}" text-anchor="end" style="font-size:9px">${unit}</text>`;

  // Day labels (00:00 boundaries)
  let days = '';
  times.forEach((t, i) => {
    const d = new Date(t);
    if (d.getHours() === 0) {
      const xx = x(i);
      days += `<line class="gridline" x1="${xx}" y1="${padT}" x2="${xx}" y2="${padT+plotH}" stroke-dasharray="3,3"/>`;
      days += `<text class="day-label" x="${xx+4}" y="${padT+14}">${d.getMonth()+1}/${d.getDate()}</text>`;
    }
  });

  // Drop region highlights
  let regions = '';
  for (const dr of drops) {
    const x1 = x(dr.startIdx - 6 < 0 ? 0 : dr.startIdx - 6), x2 = x(dr.endIdx);
    regions += `<rect x="${x1}" y="${padT}" width="${x2-x1}" height="${plotH}" fill="rgba(255,107,107,0.10)"/>`;
  }

  // 現在時刻の縦ライン（過去表示時は右端＝現在なので出さない）
  const nowMark = showNow
    ? `<line class="now-line" x1="${x(curIdx)}" y1="${padT}" x2="${x(curIdx)}" y2="${padT+plotH}"/>`
    : '';

  // 固定Y軸レイヤー（スクロールしない。左端の幅ぶんだけ。背景でグラフを隠す）
  yAxis.setAttribute('viewBox', `0 0 ${padL} ${H}`);
  yAxis.setAttribute('width', padL);
  yAxis.setAttribute('height', H);
  yAxis.innerHTML = `<rect x="0" y="0" width="${padL}" height="${H}" fill="var(--panel)"/>${yLabels}`;

  scroll.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" id="svg">
      <defs><linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(76,201,240,0.25)"/>
        <stop offset="100%" stop-color="rgba(76,201,240,0)"/>
      </linearGradient></defs>
      ${regions}${grid}${days}
      <path class="pressure-area" d="${area}"/>
      <path class="pressure-line" d="${path}"/>
      ${nowMark}
      <circle class="hover-dot" id="dot" r="4" style="opacity:0"/>
      <rect id="hit" x="${padL}" y="${padT}" width="${plotW}" height="${plotH}" fill="transparent"/>
    </svg>
    <div class="tooltip" id="tip"></div>`;

  const svg = document.getElementById('svg');
  const hit = document.getElementById('hit');
  const dot = document.getElementById('dot');
  const tip = document.getElementById('tip');

  function move(clientX) {
    const rect = svg.getBoundingClientRect();
    const scale = W / rect.width;
    const px = (clientX - rect.left) * scale;
    let i = Math.round(((px - padL) / plotW) * (n - 1));
    i = Math.max(0, Math.min(n - 1, i));
    const cx = x(i), cy = y(vals[i]);
    dot.setAttribute('cx', cx); dot.setAttribute('cy', cy); dot.style.opacity = 1;
    tip.style.opacity = 1;
    tip.classList.toggle('below', cy < H * 0.30);
    tip.style.left = (cx / scale) + 'px';
    tip.style.top = (cy / scale) + 'px';
    tip.innerHTML = `${fmtTime(times[i])}<br><span class="tp">${vals[i].toFixed(1)} ${unit}</span>`;
    selectedTime = times[i];
    const lbl = document.getElementById('recBarLabel');
    if (lbl) lbl.innerHTML = `選択中: <b class="rec-bar-time">${fmtTime(times[i])}</b>`;
  }
  let touchUsed = false; // タッチ後に発火する合成マウスイベントを無視するため
  hit.addEventListener('mousemove', e => { if (touchUsed) return; move(e.clientX); });
  hit.addEventListener('mouseleave', () => { if (touchUsed) return; dot.style.opacity = 0; tip.style.opacity = 0; });

  // タッチ: 非表示時は長押しで読み取り開始。表示中はなぞって時刻変更、タップで非表示
  let startX = 0, startY = 0, reading = false, moved = false, visible = false, wasVisible = false, pressTimer = null, hideTimer = null;
  function hideTip() { reading = false; visible = false; clearTimeout(hideTimer); dot.style.opacity = 0; tip.style.opacity = 0; }
  hit.addEventListener('touchstart', e => {
    touchUsed = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
    wasVisible = visible;
    clearTimeout(hideTimer);
    clearTimeout(pressTimer);
    if (visible) {
      reading = true; // 表示中は長押し不要で即なぞり読み取り
    } else {
      const cx = e.touches[0].clientX;
      pressTimer = setTimeout(() => { reading = true; visible = true; move(cx); }, 350);
    }
  }, {passive:true});
  hit.addEventListener('touchmove', e => {
    const dx = Math.abs(e.touches[0].clientX - startX);
    const dy = Math.abs(e.touches[0].clientY - startY);
    if (dx > 8 || dy > 8) moved = true;
    // 読み取り中は値を更新（このときだけスクロールを止める）
    if (reading) {
      move(e.touches[0].clientX);
      visible = true;
      e.preventDefault();
      return;
    }
    // 長押し成立前に動いた → スクロール意図。長押しを中止しブラウザに任せる
    if (moved) clearTimeout(pressTimer);
  }, {passive:false});
  hit.addEventListener('touchend', () => {
    clearTimeout(pressTimer);
    // 表示中に動かさずタップ → 非表示
    if (wasVisible && !moved) { hideTip(); return; }
    // なぞって読み取った → 表示を残し一定時間後に消す
    if (reading) {
      reading = false;
      hideTimer = setTimeout(() => { dot.style.opacity = 0; tip.style.opacity = 0; visible = false; }, 3000);
    }
  }, {passive:true});
}

// ===== 体調記録 =====
let selectedTime = null, LOGS = [], store = null, pendingDeleteId = null, pendingEditId = null, activeFilters = new Set();

const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ラベル選択チップ（登録/編集ダイアログ共通）。日常を先頭に LABELS を並べる
const pickerOptions = () => [DAILY, ...LABELS];
function renderLabelPicker(container, groupName, selectedId) {

}
const selectedLabel = groupName => {

  return el ? el.value : '';
};
const firebaseEnabled = () => !!(firebaseConfig && firebaseConfig.projectId && !firebaseConfig.projectId.includes('YOUR_'));

// localStorage フォールバック（Firebase 未設定時。この端末内のみ・同期なし）
function localStore() {
  let cb = null;
  const sort = a => [...a].sort((x, y) => y.createdAt - x.createdAt);
  const read = () => { try { return JSON.parse(localStorage.getItem('cobu_logs_v1')) || []; } catch { return []; } };
  const write = a => { localStorage.setItem('cobu_logs_v1', JSON.stringify(a)); if (cb) cb(sort(a)); };
  const uid = () => (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random().toString(16).slice(2));
  return {
    synced: false,
    add: rec => { const a = read(); a.push({ id: uid(), ...rec }); write(a); },
    update: (id, patch) => write(read().map(r => r.id === id ? { ...r, ...patch } : r)),
    remove: id => write(read().filter(r => r.id !== id)),
    subscribe: fn => { cb = fn; fn(sort(read())); },
  };
}

async function initStore() {
  if (firebaseEnabled()) {
    try {
      const { initializeApp } = await import(`https://www.gstatic.com/firebasejs/${FIREBASE_VER}/firebase-app.js`);
      const { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy } =
        await import(`https://www.gstatic.com/firebasejs/${FIREBASE_VER}/firebase-firestore.js`);
      const app = initializeApp(firebaseConfig);
      if (RECAPTCHA_SITE_KEY && !RECAPTCHA_SITE_KEY.includes('YOUR_')) {
        const { initializeAppCheck, ReCaptchaV3Provider } =
          await import(`https://www.gstatic.com/firebasejs/${FIREBASE_VER}/firebase-app-check.js`);
        initializeAppCheck(app, {
          provider: new ReCaptchaV3Provider(RECAPTCHA_SITE_KEY),
          isTokenAutoRefreshEnabled: true,
        });
      }
      const db = getFirestore(app);
      const col = collection(db, 'cobu_logs');
      store = {
        synced: true,
        add: rec => addDoc(col, rec),
        update: (id, patch) => updateDoc(doc(db, 'cobu_logs', id), patch),
        remove: id => deleteDoc(doc(db, 'cobu_logs', id)),
      };
      onSnapshot(query(col, orderBy('createdAt', 'desc')),
        snap => { LOGS = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderLogs(); },
        err => console.error('Firestore 購読エラー:', err));
      return;
    } catch (e) {
      console.error('Firebase 初期化に失敗。localStorage にフォールバックします:', e);
    }
  }
  store = localStore();
  store.subscribe(logs => { LOGS = logs; renderLogs(); });
}

// 記録時刻に最も近い実測/予報気圧を1点だけ取り出す（取得範囲外なら null）
function nearestPressure(timeISO, src = ALL) {
  if (!src) return null;
  const t = new Date(timeISO).getTime();
  let best = -1, bestDiff = Infinity;
  for (let i = 0; i < src.times.length; i++) {
    if (!Number.isFinite(src.vals[i])) continue;
    const d = Math.abs(new Date(src.times[i]).getTime() - t);
    if (d < bestDiff) { bestDiff = d; best = i; }
  }
  if (best < 0 || bestDiff > 3600 * 1000) return null;
  return src.vals[best];
}

// 記録時刻の前後1.5日（ミニグラフ用）の気圧を記録に埋め込む。後日データ範囲外になっても復元できる。
// 1時間等間隔なので開始時刻＋値配列だけで持つ（取得範囲外で2点未満なら null）
// 記録日を含む直近3カレンダー日 [前々日0:00, 翌日0:00) の範囲
function miniWindow(centerMs) {
  const d = new Date(centerMs); d.setHours(0, 0, 0, 0);
  const day0 = d.getTime();
  return { lo: day0 - 2 * 86400e3, hi: day0 + 86400e3 };
}

function snapshotSeries(timeISO, src = ALL) {
  if (!src) return null;
  const { lo, hi } = miniWindow(new Date(timeISO).getTime());
  let start = null;
  const vals = [];
  for (let i = 0; i < src.times.length; i++) {
    const tm = new Date(src.times[i]).getTime();
    if (tm >= lo && tm < hi && Number.isFinite(src.vals[i])) {
      if (start === null) start = src.times[i];
      vals.push(src.vals[i]);
    }
  }
  if (vals.length < 2) return null;
  return { start, vals };
}

const toDateStr = d => { const p = n => String(n).padStart(2, '0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; };

// 7日より前の記録用。登録日から2日前〜当日（miniWindow をちょうど覆う3カレンダー日）を
// Historical Weather API（archive-api）から取得する。形は ALL と同じ { times, vals, unit }。
async function fetchHistorySeries(timeISO) {
  const day = new Date(timeISO); day.setHours(0, 0, 0, 0);
  const startDate = toDateStr(new Date(day.getTime() - 2 * 86400e3));
  let endDate = toDateStr(day);
  const todayStr = toDateStr(new Date());
  if (endDate > todayStr) endDate = todayStr;
  const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${LAT}&longitude=${LON}`
    + `&hourly=pressure_msl&timezone=Asia%2FTokyo&start_date=${startDate}&end_date=${endDate}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
  const data = await res.json();
  const t = (data.hourly && data.hourly.time) || [];
  const v = (data.hourly && data.hourly.pressure_msl) || [];
  const times = [], vals = [];
  for (let i = 0; i < t.length; i++) if (Number.isFinite(v[i])) { times.push(t[i]); vals.push(v[i]); }
  if (vals.length < 2) return null;
  return { times, vals, unit: (data.hourly_units && data.hourly_units.pressure_msl) || 'hPa' };
}

// ALL（Forecast）と archive をマージ。重複時刻は ALL を優先し、不足する過去側だけ archive で補う。
function mergeSources(base, extra) {
  const map = new Map();
  if (extra) for (let i = 0; i < extra.times.length; i++) map.set(extra.times[i], extra.vals[i]);
  // base(ALL) を優先するが、base が欠損のときは extra(archive) の有限値を残す
  if (base) for (let i = 0; i < base.times.length; i++) {
    if (Number.isFinite(base.vals[i]) || !map.has(base.times[i])) map.set(base.times[i], base.vals[i]);
  }
  const times = [...map.keys()].sort();
  const vals = times.map(t => map.get(t));
  return { times, vals, unit: (base && base.unit) || (extra && extra.unit) || 'hPa' };
}

// datetime-local 入力用の "YYYY-MM-DDTHH:mm"（ローカル壁時計）
function toInputValue(d) {
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}

function openRecordDialog(timeISO) {
  const base = timeISO ? new Date(timeISO) : new Date();
  document.getElementById('recDateTime').value = toInputValue(base);
  document.getElementById('recMemo').value = '';
  renderLabelPicker(document.getElementById('recLabelPicker'), 'recLabel', '');
  document.getElementById('recDialog').showModal();
}

function openDeleteDialog(id) {
  pendingDeleteId = id;
  document.getElementById('delDialog').showModal();
}

function openEditDialog(id) {
  const log = LOGS.find(l => l.id === id);
  if (!log) return;
  pendingEditId = id;
  document.getElementById('editMemo').value = log.memo || '';
  renderLabelPicker(document.getElementById('editLabelPicker'), 'editLabel', log.label || '');
  document.getElementById('editDialog').showModal();
}

// 一覧ヘッダ右のラベル絞り込み（色丸）。色付きラベル→日常の順。複数選択可（OR）
function filterBarHtml() {
  return '<span class="log-filter">' + [...LABELS, DAILY].map(o =>
    `<button type="button" class="filter-dot${activeFilters.has(o.id) ? ' active' : ''}" data-filter="${o.id}" title="${o.name}" style="--chip:${o.color}"><span class="dot"></span></button>`
  ).join('') + '</span>';
}

function renderLogs() {
  const panel = document.getElementById('logsPanel');
  if (!panel) return;
  const unit = ALL ? ALL.unit : 'hPa';
  let html = `<h2>記録一覧 ${LOGS.length ? filterBarHtml() : ''}</h2>`;
  if (store && !store.synced) {
    html += `<div class="logs-note">この端末内のみ保存中です。複数端末で共有するには Firebase を設定してください（README 参照）。</div>`;
  }
  const list = (activeFilters.size === 0 ? [...LOGS] : LOGS.filter(l => activeFilters.has(l.label || '')))
    .sort((a, b) => new Date(b.time) - new Date(a.time));
  if (!LOGS.length) {
    html += `<div class="logs-empty">まだ記録はありません。グラフで時刻を選んで下の「記録」ボタンから登録できます。</div>`;
  } else if (!list.length) {
    html += `<div class="logs-empty">選択中のラベルに一致する記録はありません。</div>`;
  } else {
    html += '<div class="log-list">';
    for (const log of list) {
      const p = (log.pressure != null) ? `${Number(log.pressure).toFixed(1)} ${unit}` : '—';
      const lab = labelById(log.label);
      const bandStyle = lab ? ` style="border-left:3px solid ${lab.color}"` : '';
      html += `<div class="log-card"${bandStyle} data-id="${escapeHtml(log.id)}" data-time="${escapeHtml(log.time)}">
        <div class="log-head">
          <div class="log-main">
            <div class="log-time">${fmtTime(log.time)}</div>
            ${log.memo ? `<div class="log-memo">${escapeHtml(log.memo)}</div>` : ''}
          </div>
          <div class="log-side">
            <span class="log-p">${p}</span>
            <span class="log-caret" aria-hidden="true">▾</span>
          </div>
        </div>
        <div class="log-mini" hidden>
          <div class="log-mini-chart"></div>
          <div class="log-mini-actions">
            <button type="button" class="log-close">▲ 閉じる</button>
            <div class="log-mini-actions-right">
              <button type="button" class="log-edit" data-id="${escapeHtml(log.id)}">✏️ 編集</button>
              <button type="button" class="log-del" data-id="${escapeHtml(log.id)}">🗑 記録を削除</button>
            </div>
          </div>
        </div>
      </div>`;
    }
    html += '</div>';
  }
  panel.innerHTML = html;
}

// 記録日を含む3カレンダー日（前々日0:00〜記録日23:00）の気圧ミニグラフ。
// メイングラフと同一縮尺で描く（静的・ツールチップなし、はみ出す時のみ横スクロール）。
// 記録に埋め込んだ series があればそれを使い、無ければ ALL から復元する。
function drawMiniChart(container, centerTimeISO, series) {
  const c = new Date(centerTimeISO).getTime();
  let times, vals;
  if (series && Array.isArray(series.vals) && series.vals.length >= 2) {
    const startMs = new Date(series.start).getTime();
    times = series.vals.map((_, i) => new Date(startMs + i * 3600e3));
    vals = series.vals;
  } else if (ALL) {
    const { lo, hi } = miniWindow(c);
    const idx = [];
    for (let i = 0; i < ALL.times.length; i++) {
      const tm = new Date(ALL.times[i]).getTime();
      if (tm >= lo && tm < hi) idx.push(i);
    }
    if (idx.length < 2) { container.innerHTML = '<div class="mini-empty">この期間の気圧データは取得範囲外です。</div>'; return; }
    times = idx.map(i => new Date(ALL.times[i]));
    vals = idx.map(i => ALL.vals[i]);
  } else {
    container.innerHTML = '<div class="mini-empty">気圧データを取得中です。</div>'; return;
  }
  const n = vals.length;
  const unit = ALL ? ALL.unit : 'hPa';
  // メイングラフと同じジオメトリ・縮尺（横密度 4.6px/h、Y範囲は共通 yRange）
  const H = 320, padL = 48, padR = 16, padT = 26, padB = 40;
  const W = Math.round(4.6 * (n - 1)) + padL + padR;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const { lo: loV, hi: hiV } = yRange(vals);
  const span = (hiV - loV) || 1;
  const x = i => padL + (i / (n - 1)) * plotW;
  const y = v => padT + (1 - (v - loV) / span) * plotH;
  let path = '';
  vals.forEach((v, i) => { path += (i === 0 ? 'M' : 'L') + x(i).toFixed(1) + ',' + y(v).toFixed(1) + ' '; });
  const area = path + `L${x(n-1).toFixed(1)},${padT+plotH} L${x(0).toFixed(1)},${padT+plotH} Z`;
  let best = 0, bd = Infinity;
  times.forEach((t, i) => { const d = Math.abs(new Date(t).getTime() - c); if (d < bd) { bd = d; best = i; } });
  const mx = x(best);
  // Y罫線と値ラベル（メイングラフと同じ6分割・同じクラス）
  let grid = '', yl = '';
  const step = (hiV - loV) / 5;
  for (let k = 0; k <= 5; k++) {
    const v = loV + step * k, yy = y(v);
    grid += `<line class="gridline" x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}"/>`;
    yl += `<text class="axis-label" x="${padL-8}" y="${(yy+4).toFixed(1)}" text-anchor="end">${v.toFixed(0)}</text>`;
  }
  // 0時境界の縦線＋日付ラベル（メイングラフと同じ）
  let days = '';
  times.forEach((t, i) => {
    const d = new Date(t);
    if (d.getHours() !== 0) return;
    const xx = x(i);
    days += `<line class="gridline" x1="${xx.toFixed(1)}" y1="${padT}" x2="${xx.toFixed(1)}" y2="${padT+plotH}" stroke-dasharray="3,3"/>`;
    days += `<text class="day-label" x="${(xx+4).toFixed(1)}" y="${padT+14}">${d.getMonth()+1}/${d.getDate()}</text>`;
  });
  // 気圧急降下区間のハイライト（メイングラフと同じ検出・同じ色。窓内の低下を全て対象）
  let regions = '';
  for (const dr of detectDrops(times, vals, 0)) {
    const x1 = x(Math.max(0, dr.startIdx - 6)), x2 = x(dr.endIdx);
    regions += `<rect x="${x1.toFixed(1)}" y="${padT}" width="${(x2-x1).toFixed(1)}" height="${plotH}" fill="rgba(255,107,107,0.10)"/>`;
  }
  // 面のグラデはメイングラフと同色。複数カード同時表示でidが衝突しないよう一意id＋ローカルdefs
  const gid = 'gm' + Math.random().toString(36).slice(2);
  // メイングラフと同じく固定Y軸（スクロールしない）＋スクロール本体の2レイヤー。
  // Y軸 SVG は不透明背景（カードと同じ var(--panel-2)）で本体の左端を隠す。
  container.innerHTML = `<svg class="log-mini-yaxis" viewBox="0 0 ${padL} ${H}" width="${padL}" height="${H}">
    <rect x="0" y="0" width="${padL}" height="${H}" fill="var(--panel-2)"/>${yl}
  </svg>
  <div class="log-mini-scroll">
    <svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" style="display:block">
      <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(76,201,240,0.25)"/>
        <stop offset="100%" stop-color="rgba(76,201,240,0)"/>
      </linearGradient></defs>
      ${regions}${grid}${days}
      <path d="${area}" fill="url(#${gid})"/>
      <path class="pressure-line" d="${path}"/>
      <line class="mini-mark" x1="${mx}" y1="${padT}" x2="${mx}" y2="${padT+plotH}"/>
      <circle cx="${mx}" cy="${y(vals[best]).toFixed(1)}" r="3.5" fill="var(--warn)"/>
      <circle class="hover-dot mini-dot" r="4" style="opacity:0"/>
      <rect class="mini-hit" x="${padL}" y="${padT}" width="${plotW}" height="${plotH}" fill="transparent"/>
    </svg>
    <div class="tooltip mini-tip"></div>
  </div>`;
  // 記録日付近が初期表示で見えるよう横スクロール位置を寄せる
  const scroller = container.querySelector('.log-mini-scroll');
  scroller.scrollLeft = Math.max(0, mx - scroller.clientWidth / 2);

  // メイングラフと同じ長押し/なぞりでの詳細表示。複数カードが同時に開けるよう要素はローカル取得
  const bodySvg = scroller.querySelector('svg');
  const hit = scroller.querySelector('.mini-hit');
  const dot = scroller.querySelector('.mini-dot');
  const tip = scroller.querySelector('.mini-tip');
  function move(clientX) {
    const rect = bodySvg.getBoundingClientRect();
    const scale = W / rect.width;
    const px = (clientX - rect.left) * scale;
    let i = Math.round(((px - padL) / plotW) * (n - 1));
    i = Math.max(0, Math.min(n - 1, i));
    const cx = x(i), cy = y(vals[i]);
    dot.setAttribute('cx', cx); dot.setAttribute('cy', cy); dot.style.opacity = 1;
    tip.style.opacity = 1;
    tip.classList.toggle('below', cy < H * 0.30);
    tip.style.left = (cx / scale) + 'px';
    tip.style.top = (cy / scale) + 'px';
    tip.innerHTML = `${fmtTime(times[i])}<br><span class="tp">${vals[i].toFixed(1)} ${unit}</span>`;
  }
  let touchUsed = false; // タッチ後に発火する合成マウスイベントを無視するため
  hit.addEventListener('mousemove', e => { if (touchUsed) return; move(e.clientX); });
  hit.addEventListener('mouseleave', () => { if (touchUsed) return; dot.style.opacity = 0; tip.style.opacity = 0; });
  // タッチ: 非表示時は長押しで読み取り開始。表示中はなぞって時刻変更、タップで非表示
  let startX = 0, startY = 0, reading = false, moved = false, visible = false, wasVisible = false, pressTimer = null, hideTimer = null;
  function hideTip() { reading = false; visible = false; clearTimeout(hideTimer); dot.style.opacity = 0; tip.style.opacity = 0; }
  hit.addEventListener('touchstart', e => {
    touchUsed = true;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
    wasVisible = visible;
    clearTimeout(hideTimer);
    clearTimeout(pressTimer);
    if (visible) {
      reading = true; // 表示中は長押し不要で即なぞり読み取り
    } else {
      const cx = e.touches[0].clientX;
      pressTimer = setTimeout(() => { reading = true; visible = true; move(cx); }, 350);
    }
  }, {passive:true});
  hit.addEventListener('touchmove', e => {
    const dx = Math.abs(e.touches[0].clientX - startX);
    const dy = Math.abs(e.touches[0].clientY - startY);
    if (dx > 8 || dy > 8) moved = true;
    // 読み取り中は値を更新（このときだけスクロールを止める）
    if (reading) {
      move(e.touches[0].clientX);
      visible = true;
      e.preventDefault();
      return;
    }
    // 長押し成立前に動いた → スクロール意図。長押しを中止しブラウザに任せる
    if (moved) clearTimeout(pressTimer);
  }, {passive:false});
  hit.addEventListener('touchend', () => {
    clearTimeout(pressTimer);
    // 表示中に動かさずタップ → 非表示
    if (wasVisible && !moved) { hideTip(); return; }
    // なぞって読み取った → 表示を残し一定時間後に消す
    if (reading) {
      reading = false;
      hideTimer = setTimeout(() => { dot.style.opacity = 0; tip.style.opacity = 0; visible = false; }, 3000);
    }
  }, {passive:true});
}

function setupRecordingUI() {
  const dlg = document.getElementById('recDialog');
  document.getElementById('recCancel').addEventListener('click', () => dlg.close());
  document.getElementById('recSave').addEventListener('click', async () => {
    const time = document.getElementById('recDateTime').value;
    if (!time) return;
    const memo = document.getElementById('recMemo').value.trim();
    const label = selectedLabel('recLabel');
    const btn = document.getElementById('recSave');
    const orig = btn.textContent; btn.disabled = true;
    try {
      let src = ALL;
      const t = new Date(time).getTime();
      const { lo } = miniWindow(t);
      const allStart = ALL ? new Date(ALL.times[0]).getTime() : Infinity;
      if (lo < allStart && t < Date.now()) {
        // 3日窓が ALL の取得範囲（≒直近7日）の先頭に食い込む過去記録は archive で補う
        btn.textContent = '気圧データ取得中…';
        try { const hist = await fetchHistorySeries(time); if (hist) src = mergeSources(ALL, hist); }
        catch (e) { console.error('Historical API 取得失敗:', e); }
      }
      await store.add({ time, memo, label, pressure: nearestPressure(time, src), series: snapshotSeries(time, src), createdAt: Date.now() });
      dlg.close();
    } catch (e) {
      alert('保存に失敗しました: ' + e.message);
    } finally {
      btn.disabled = false; btn.textContent = orig;
    }
  });
  const delDlg = document.getElementById('delDialog');
  document.getElementById('delCancel').addEventListener('click', () => delDlg.close());
  document.getElementById('delConfirm').addEventListener('click', async () => {
    if (pendingDeleteId) {
      try { await store.remove(pendingDeleteId); } catch (e) { alert('削除に失敗しました: ' + e.message); }
    }
    pendingDeleteId = null;
    delDlg.close();
  });
  const editDlg = document.getElementById('editDialog');
  document.getElementById('editCancel').addEventListener('click', () => editDlg.close());
  document.getElementById('editSave').addEventListener('click', async () => {
    if (pendingEditId) {
      const memo = document.getElementById('editMemo').value.trim();
      const label = selectedLabel('editLabel');
      try { await store.update(pendingEditId, { memo, label }); } catch (e) { alert('保存に失敗しました: ' + e.message); }
    }
    pendingEditId = null;
    editDlg.close();
  });
  document.getElementById('logsPanel').addEventListener('click', e => {
    const fdot = e.target.closest('.filter-dot');
    if (fdot) { const f = fdot.dataset.filter; activeFilters.has(f) ? activeFilters.delete(f) : activeFilters.add(f); renderLogs(); return; }
    const edit = e.target.closest('.log-edit');
    if (edit) { e.stopPropagation(); openEditDialog(edit.dataset.id); return; }
    const del = e.target.closest('.log-del');
    if (del) { e.stopPropagation(); openDeleteDialog(del.dataset.id); return; }
    const closeBtn = e.target.closest('.log-close');
    if (closeBtn) {
      const card = closeBtn.closest('.log-card');
      card.querySelector('.log-mini').hidden = true;
      card.classList.remove('open');
      return;
    }
    const head = e.target.closest('.log-head');
    if (head) {
      const card = head.closest('.log-card');
      const mini = card.querySelector('.log-mini');
      if (mini.hidden) {
        const log = LOGS.find(l => l.id === card.dataset.id);
        mini.hidden = false;
        card.classList.add('open');
        drawMiniChart(mini.querySelector('.log-mini-chart'), card.dataset.time, log && log.series);
      } else {
        mini.hidden = true;
        card.classList.remove('open');
      }
    }
  });
}

setupRecordingUI();
renderLogs();
initStore();
load();
</script>

<dialog id="recDialog" class="rec-dialog">
  <h3>記録 📝</h3>
  <label>日時
    <input type="datetime-local" id="recDateTime">
  </label>
  <div class="rec-field"><span class="field-cap">ラベル</span>
    <div class="label-picker" id="recLabelPicker"></div>
  </div>
  <label>メモ（任意）
    <textarea id="recMemo" rows="3" placeholder="様子・症状など"></textarea>
  </label>
  <div class="rec-dialog-actions">
    <button type="button" id="recCancel" class="btn-ghost" autofocus>キャンセル</button>
    <button type="button" id="recSave" class="btn-primary">保存</button>
  </div>
</dialog>

<dialog id="delDialog" class="rec-dialog">
  <h3>記録を削除 🗑</h3>
  <p class="del-text">この記録を削除しますか？ この操作は取り消せません。</p>
  <div class="rec-dialog-actions">
    <button type="button" id="delCancel" class="btn-ghost">キャンセル</button>
    <button type="button" id="delConfirm" class="btn-danger">削除</button>
  </div>
</dialog>

<dialog id="editDialog" class="rec-dialog">
  <h3>記録を編集 ✏️</h3>
  <div class="rec-field"><span class="field-cap">ラベル</span>
    <div class="label-picker" id="editLabelPicker"></div>
  </div>
  <label>メモ
    <textarea id="editMemo" rows="3" placeholder="様子・症状など"></textarea>
  </label>
  <div class="rec-dialog-actions">
    <button type="button" id="editCancel" class="btn-ghost">キャンセル</button>
    <button type="button" id="editSave" class="btn-primary">保存</button>
  </div>
</dialog>
</body>
</html>
